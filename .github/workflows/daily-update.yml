name: Nightly Score Calculation

# 08:00 UTC is roughly 3:00 AM EST / 4:00 AM EDT.
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: # Manual "Run workflow" button in GitHub Actions tab

jobs:
  update-scores:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Score Update Script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/masterCron.js
