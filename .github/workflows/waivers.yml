name: Commissioner Bot (Waivers)

on:
  schedule:
    # Runs at 6:00 AM UTC every day (which is 1:00 AM / 2:00 AM EST)
    # This ensures it runs safely after the midnight deadline passes
    - cron: "0 6 * * *"
  workflow_dispatch: # This line allows you to trigger it manually from github.com if you ever need to!

jobs:
  run-waivers:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Run Waiver Engine
        run: node scripts/processWaivers.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
